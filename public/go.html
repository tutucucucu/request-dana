<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permintaan Diproses</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e6f0ff;
            padding: 1rem;
        }

        .container {
            background: #ffffff;
            max-width: 420px;
            width: 100%;
            padding: 2.5rem 2rem;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0, 80, 200, 0.12);
            text-align: center;
            border: 1px solid rgba(70, 130, 255, 0.10);
        }

        .icon-check {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a3d7c;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .message {
            color: #3a6bb0;
            font-size: 1rem;
            background: #eef5ff;
            padding: 1rem 1.2rem;
            border-radius: 16px;
            margin: 1.5rem 0;
            border: 1px solid #cddfff;
            line-height: 1.6;
        }

        .nomor-display {
            display: inline-block;
            background: #2a7aff;
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            margin-top: 0.3rem;
        }

        .btn-back {
            display: inline-block;
            margin-top: 1.8rem;
            padding: 0.7rem 2rem;
            background: #2a7aff;
            color: white;
            text-decoration: none;
            border-radius: 60px;
            font-weight: 500;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(42, 122, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-back:hover {
            background: #1a5fd9;
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(42, 122, 255, 0.4);
        }

        .footnote {
            margin-top: 1.6rem;
            font-size: 0.75rem;
            color: #5b7fb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon-check">✅</span>
        <h1>Permintaan Dikirim</h1>
        
        <div class="message">
            <strong>Nomor DANA:</strong><br>
            <span class="nomor-display" id="nomorDisplay">+62 812 3456 7890</span>
        </div>

        <p style="color: #1f4a8a; font-size: 0.95rem; margin-top: 0.5rem;">
            Permintaan Anda sedang diproses.
        </p>

        <a href="index.html" class="btn-back">← Kembali</a>
        <div class="footnote">⏤ simulasi permintaan dana ⏤</div>
    </div>

    <script>
        (function() {
            // Ambil parameter nomor dari URL
            const urlParams = new URLSearchParams(window.location.search);
            let nomor = urlParams.get('nomor') || '812 3456 7890';
            
            // Bersihkan dan format nomor
            nomor = nomor.trim();
            // Jika tidak ada +62 di depan, tambahkan
            if (!nomor.startsWith('+62')) {
                // Hapus semua spasi berlebih
                let clean = nomor.replace(/\s+/g, '');
                // Jika hanya angka tanpa +62
                if (/^\d+$/.test(clean)) {
                    nomor = '+62 ' + clean;
                } else {
                    nomor = '+62 ' + nomor;
                }
            }
            
            // Tampilkan di elemen
            const display = document.getElementById('nomorDisplay');
            if (display) {
                display.textContent = nomor;
            }
        })();
    </script>
</body>
</html>
