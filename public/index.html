<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Dana</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #e6f0ff;
      padding: 1rem;
    }

    .card {
      background-color: #ffffff;
      max-width: 420px;
      width: 100%;
      padding: 2.5rem 2rem 2.2rem;
      border-radius: 32px;
      box-shadow: 0 12px 30px rgba(0, 80, 200, 0.12);
      text-align: center;
      border: 1px solid rgba(70, 130, 255, 0.10);
    }

    .card h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #1a3d7c;
      margin-bottom: 0.4rem;
    }

    .subhead {
      font-size: 0.95rem;
      color: #3a6bb0;
      background: #eef5ff;
      display: inline-block;
      padding: 0.2rem 1.2rem;
      border-radius: 30px;
      margin-bottom: 1.8rem;
      font-weight: 500;
      border: 1px solid #cddfff;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.3rem;
      margin-bottom: 1.8rem;
      text-align: left;
    }

    .input-group label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #1f4a8a;
      margin-left: 0.3rem;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background-color: #f2f8ff;
      border-radius: 60px;
      padding: 0.2rem 0.2rem 0.2rem 1.5rem;
      border: 1.5px solid #b8d2ff;
      transition: 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: #2a7aff;
      box-shadow: 0 0 0 4px rgba(42, 122, 255, 0.15);
      background-color: #ffffff;
    }

    .input-wrapper span {
      color: #1f4a8a;
      font-weight: 500;
      font-size: 1rem;
      margin-right: 0.25rem;
    }

    .input-wrapper input {
      border: none;
      background: transparent;
      padding: 0.9rem 0.8rem 0.9rem 0.2rem;
      font-size: 1rem;
      width: 100%;
      outline: none;
      color: #0b2b5a;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .input-wrapper input::placeholder {
      color: #8ba9d9;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .btn-submit {
      background: #2a7aff;
      border: none;
      padding: 0.95rem 1.2rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 14px rgba(42, 122, 255, 0.3);
      letter-spacing: 0.5px;
      margin-top: 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-submit:hover {
      background: #1a5fd9;
      box-shadow: 0 8px 18px rgba(42, 122, 255, 0.4);
      transform: scale(1.01);
    }

    .btn-submit:active {
      background: #0f4bb8;
      transform: scale(0.98);
      box-shadow: 0 3px 8px rgba(42, 122, 255, 0.3);
    }

    .footnote {
      margin-top: 1.6rem;
      font-size: 0.8rem;
      color: #5b7fb5;
      background: #eaf2ff;
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      display: inline-block;
      border: 1px solid #cddfff;
    }

    @media (max-width: 450px) {
      .card {
        padding: 2rem 1.2rem;
      }
      .card h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Request Dana</h1>
    <div class="subhead">isi nomor DANA</div>

    <form id="danaForm" action="go.html" method="GET">
      <div class="input-group">
        <label for="danaNumber">Nomor DANA</label>
        <div class="input-wrapper">
          <span>+62</span>
          <input 
            type="tel" 
            id="danaNumber" 
            name="nomor" 
            placeholder="812 3456 7890" 
            required
            pattern="[0-9\s\-+]{8,15}"
            title="Masukkan nomor DANA yang valid (minimal 8 digit)"
          >
        </div>
      </div>

      <button type="submit" class="btn-submit">Kirim</button>
    </form>

    <div class="footnote">⏤ hanya untuk simulasi ⏤</div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('danaForm');
      const input = document.getElementById('danaNumber');

      form.addEventListener('submit', function(e) {
        let raw = input.value.trim();
        raw = raw.replace(/\s+/g, ' ').trim();
        input.value = raw;
      });

      window.addEventListener('load', function() {
        input.focus();
      });
    })();
  </script>
</body>
</html>
